<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Got You!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
video { width: 100%; height: 100%; object-fit: contain; }
#tap {
  display: none; position: fixed; inset: 0;
  flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
}
#tap.show { display: flex; }
#tap-circle {
  width: 110px; height: 110px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 3px solid rgba(255,255,255,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(255,255,255,0.25); }
  50%      { transform: scale(1.07); box-shadow: 0 0 0 18px rgba(255,255,255,0); }
}
#tap p { margin-top: 22px; color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 15px; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>

<video id="vid" autoplay controls playsinline></video>

<div id="tap">
  <div id="tap-circle">▶</div>
  <p>tap to play</p>
</div>

<script>
const vid = document.getElementById('vid');
const tap = document.getElementById('tap');

vid.src = 'rickroll.mp4';
vid.load();

// Try autoplay — if it works, great, stays hidden
vid.play().catch(() => {
  // Autoplay blocked or failed — show the tap button
  tap.classList.add('show');
});

tap.addEventListener('click', () => {
  tap.classList.remove('show');
  vid.play().catch(() => {});
});
</script>

</body>
</html>
